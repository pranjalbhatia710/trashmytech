services:
  - type: web
    name: trashmytech-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: starter
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: HEADLESS
        value: "true"
      - key: AGENT_COUNT
        value: "30"
      - key: NUM_BROWSERS
        value: "5"
